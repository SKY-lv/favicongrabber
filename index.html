<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaviconGrabber - Favicon获取工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{max-width:700px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:1.5em;} .header h1 span{color:#f97316;}
.input-area{background:#1e293b;border-radius:12px;padding:20px;}
.input-area input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:14px;font-size:14px;}
.input-area input:focus{outline:none;border-color:#f97316;}
.btn{padding:14px 28px;background:#f97316;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:500;margin-top:12px;}
.results{background:#1e293b;border-radius:12px;padding:20px;margin-top:16px;}
.result-item{display:flex;align-items:center;gap:16px;padding:16px;border-bottom:1px solid #334155;}
.result-item img{width:32px;height:32px;border-radius:6px;}
.result-item .info{flex:1;}
.result-item .url{font-size:14px;}
.result-item .size{font-size:12px;color:#64748b;}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>Favicon<span>Grabber</span></h1></div>
  
  <div class="input-area">
    <input type="text" id="url" placeholder="输入域名，如 example.com">
    <button class="btn" onclick="getFavicon()">获取Favicon</button>
  </div>
  
  <div class="results" id="results"></div>
</div>

<script>
function getFavicon() {
  const domain = document.getElementById('url').value.trim().replace(/^https?:\/\//, '');
  if (!domain) return;
  
  const sizes = [128, 64, 32, 16];
  document.getElementById('results').innerHTML = sizes.map(sz => `
    <div class="result-item">
      <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=${sz}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>'">
      <div class="info">
        <div class="url">https://${domain}</div>
        <div class="size">${sz}x${sz}</div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
